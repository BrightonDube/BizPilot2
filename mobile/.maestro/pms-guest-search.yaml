# Maestro E2E Test: PMS Guest Search (Task 39.1)
#
# Validates guest search by room number from the POS screen.
# The guest search modal is triggered from the payment flow.

appId: com.bizpilot.pos
tags:
  - pos
---

# Precondition: User is on POS screen
- assertVisible:
    text: "POS"

# Add item to cart (tap first product)
- tapOn:
    text: ".*"
    index: 0
    optional: true

# Open payment
- tapOn:
    text: "Checkout"
    optional: true
- tapOn:
    text: "Pay"
    optional: true

# Select Room Charge to trigger guest search
- tapOn:
    text: "Room Charge"

# Guest search modal should appear
- assertVisible:
    text: "Search"
    optional: true

# Type room number
- inputText: "205"

# Tap search
- tapOn:
    text: "Search"
    optional: true

# Verify guest result appears (room 205 guest name or room label)
- assertVisible:
    text: "205"
    optional: true
