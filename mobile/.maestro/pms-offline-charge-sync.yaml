# Maestro E2E Test: Offline Charge Queuing & Sync (PMS Task 31.6)
#
# Validates the offline charge queuing and automatic sync behavior:
# 1. Verify PMS offline indicators
# 2. Queue a charge while offline
# 3. Verify pending charges indicator updates
# 4. Verify sync resumes on reconnect
#
# Note: Full offline simulation requires device network control.
# This test validates the UI-level behavior and indicators.

appId: com.bizpilot.pos
tags:
  - pos
---

# ---------------------------------------------------------------
# Precondition: User is on POS screen (logged in)
# ---------------------------------------------------------------
- assertVisible:
    text: "POS"

# ---------------------------------------------------------------
# Step 1: Verify PMS connection status indicator exists
# The PMSStatusIndicator should be rendered somewhere on the POS screen
# ---------------------------------------------------------------
- assertVisible:
    text: "Connected"
    optional: true

# ---------------------------------------------------------------
# Step 2: Add product to cart
# ---------------------------------------------------------------
- tapOn:
    text: ".*"
    index: 0
    optional: true

# ---------------------------------------------------------------
# Step 3: Open checkout
# ---------------------------------------------------------------
- tapOn:
    text: "Checkout"
    optional: true
- tapOn:
    text: "Pay"
    optional: true

# ---------------------------------------------------------------
# Step 4: Select Room Charge (queues if offline)
# ---------------------------------------------------------------
- tapOn:
    text: "Room Charge"
    optional: true

# ---------------------------------------------------------------
# Step 5: Complete charge flow (queued for later sync)
# ---------------------------------------------------------------
- inputText: "101"
- tapOn:
    text: "Search"
    optional: true
- tapOn:
    text: "Room 101"
    optional: true

# ---------------------------------------------------------------
# Step 6: Confirm the charge
# ---------------------------------------------------------------
- swipe:
    direction: RIGHT
    duration: 500
- tapOn:
    text: "Confirm"
    optional: true

# ---------------------------------------------------------------
# Step 7: Verify pending charges indicator
# When a charge is queued offline, the PendingChargesIndicator
# should show the count of pending charges.
# ---------------------------------------------------------------
- assertVisible:
    text: "Pending"
    optional: true

# ---------------------------------------------------------------
# Step 8: Verify the app doesn't crash during the full offline flow
# ---------------------------------------------------------------
- assertVisible:
    text: "POS"
