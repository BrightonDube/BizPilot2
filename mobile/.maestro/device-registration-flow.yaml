# Maestro E2E Test: Mobile Device Flow (Permissions Task 19.3)
#
# Validates the full device registration → sync → offline → resync flow:
# 1. Login triggers device registration
# 2. Sync includes permissions in response
# 3. App works with synced permissions
# 4. Re-sync refreshes permissions
#
# Why test device flow?
# Device registration is the gateway to multi-device POS management.
# A broken device flow means new iPads can't be onboarded.

appId: com.bizpilot.pos
tags:
  - auth
---

# ---------------------------------------------------------------
# Step 1: Start from login screen
# ---------------------------------------------------------------
- assertVisible: "BizPilot"
- assertVisible: "Point of Sale"

# ---------------------------------------------------------------
# Step 2: Login (triggers device registration + initial sync)
# ---------------------------------------------------------------
- tapOn:
    id: "login-email-input"
- inputText: ${TEST_EMAIL}
- tapOn:
    id: "login-password-input"
- inputText: ${TEST_PASSWORD}
- tapOn:
    id: "login-submit-button"

# ---------------------------------------------------------------
# Step 3: Verify navigation to POS (means sync succeeded)
# Device registration happens during auth + first sync
# ---------------------------------------------------------------
- assertVisible:
    text: "POS"
    optional: false

# ---------------------------------------------------------------
# Step 4: Navigate to Settings to verify sync status
# ---------------------------------------------------------------
- tapOn:
    text: "Settings"
- assertVisible:
    text: "Settings"

# ---------------------------------------------------------------
# Step 5: Verify sync-related UI exists
# Settings should show last sync time or sync button
# ---------------------------------------------------------------
- assertVisible:
    text: "Sync"
    optional: true

# ---------------------------------------------------------------
# Step 6: Trigger manual sync (re-sync)
# ---------------------------------------------------------------
- tapOn:
    text: "Sync"
    optional: true

# ---------------------------------------------------------------
# Step 7: Navigate back to POS (confirms app still works)
# ---------------------------------------------------------------
- tapOn:
    text: "POS"
- assertVisible:
    text: "POS"
